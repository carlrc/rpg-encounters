services:
  backend:
    image: rpg-encounters-backend:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dependencies # Use dependencies stage for dev
    container_name: rpg-encounters-backend
    pull_policy: never
    ports:
      - "8000:8000"
    command: [ "/app/.venv/bin/python", "-m", "app.main" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app # Mount code for hot reload
      - ./tests:/app/tests # Mount tests for local dev/e2e helpers
      - ./.env:/app/.env:ro # Mount your local .env file
    environment:
      # Ensure this is local
      - ENVIRONMENT=local
      # Container-to-container DB access must use the compose service name, not localhost
      # But local scripts require localhost, so override here
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    user: root # Override user for development to avoid permission issues with mounted volumes
    networks:
      - rpg-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:17
    restart: always
    container_name: rpg-encounters-data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # Use named volume instead of local path
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpg-network

  adminer:
    container_name: rpg-encounters-adminer
    image: adminer
    restart: always
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - rpg-network

volumes:
  pgdata:
