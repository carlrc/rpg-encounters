services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dependencies # Use dependencies stage for dev
    container_name: rpg-encounters-backend
    ports:
      - "8000:8000"
    command: [ "/app/.venv/bin/python", "-m", "app.main" ]
    volumes:
      - ./app:/app/app # Mount code for hot reload
      - ./.env:/app/.env:ro # Mount your local .env file
    user: root # Override user for development to avoid permission issues with mounted volumes
    networks:
      - rpg-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    volumes:
      - pgdata:/var/lib/postgresql/data # Use named volume instead of local path

volumes:
  pgdata:
